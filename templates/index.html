<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maternal Health Monitoring System</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background: #050d1a;
  color: white;
  font-family: Arial;
}
.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
  margin: 10px;
}
</style>
</head>

<body>

<h1 style="text-align:center;">Maternal Health Monitoring System</h1>
<p style="text-align:center;">IIT BHU - Varanasi | Developed by Mohan Krishna</p>

<!-- INPUT FORM -->
<div class="card">
<form method="POST" action="/predict">

<input name="age" placeholder="Age" required>
<input name="weight" id="weight" placeholder="Weight" required>
<input name="height" id="height" placeholder="Height" required>
<input name="sys_bp" placeholder="Systolic BP" required>
<input name="dia_bp" placeholder="Diastolic BP" required>

<input type="hidden" name="bmi" id="bmi">

<p>BMI: <span id="bmiVal">--</span></p>

<button type="submit">Predict</button>

</form>
</div>

<!-- LIVE DATA -->
<div class="card">
<h2>Live Data</h2>

<p>Temperature: <span id="temp">--</span></p>
<p>BPM: <span id="bpm">--</span></p>
<p>Stress: <span id="stress">--</span></p>
<p>SpO2: <span id="spo2">--</span></p>
<p>Fetal Kicks: <span id="kicks">--</span></p>

<p>Prediction: <span id="pred">{{ prediction }}</span></p>

</div>

<!-- CHARTS -->
<div class="card">
<canvas id="tempChart"></canvas>
<canvas id="bpmChart"></canvas>
<canvas id="spo2Chart"></canvas>
<canvas id="kicksChart"></canvas>
</div>

<script>

const API = "/live";

let tempArr = [], bpmArr = [], spo2Arr = [], kicksArr = [], labels=[];

function calcBMI(){
let w = parseFloat(document.getElementById("weight").value);
let h = parseFloat(document.getElementById("height").value);

if(w && h){
let bmi = w / ((h/100)*(h/100));
document.getElementById("bmi").value = bmi;
document.getElementById("bmiVal").innerText = bmi.toFixed(2);
}
}

document.getElementById("weight").oninput = calcBMI;
document.getElementById("height").oninput = calcBMI;

function push(arr,val){
arr.push(val);
if(arr.length>20) arr.shift();
}

const tempChart = new Chart(document.getElementById("tempChart"), {
type:'line',
data:{labels:[],datasets:[{data:[],borderColor:'cyan'}]}
});

const bpmChart = new Chart(document.getElementById("bpmChart"), {
type:'line',
data:{labels:[],datasets:[{data:[],borderColor:'red'}]}
});

const spo2Chart = new Chart(document.getElementById("spo2Chart"), {
type:'line',
data:{labels:[],datasets:[{data:[],borderColor:'green'}]}
});

const kicksChart = new Chart(document.getElementById("kicksChart"), {
type:'bar',
data:{labels:[],datasets:[{data:[],backgroundColor:'orange'}]}
});

async function update(){

let res = await fetch(API);
let data = await res.json();

document.getElementById("temp").innerText = data.temp;
document.getElementById("bpm").innerText = data.bpm;
document.getElementById("stress").innerText = data.stress;
document.getElementById("spo2").innerText = data.spo2;
document.getElementById("kicks").innerText = data.kicks;

document.getElementById("pred").innerText = data.prediction;

let t = new Date().toLocaleTimeString();

push(labels,t);
push(tempArr,data.temp);
push(bpmArr,data.bpm);
push(spo2Arr,data.spo2);
push(kicksArr,data.kicks);

tempChart.data.labels = labels;
tempChart.data.datasets[0].data = tempArr;
tempChart.update();

bpmChart.data.labels = labels;
bpmChart.data.datasets[0].data = bpmArr;
bpmChart.update();

spo2Chart.data.labels = labels;
spo2Chart.data.datasets[0].data = spo2Arr;
spo2Chart.update();

kicksChart.data.labels = labels;
kicksChart.data.datasets[0].data = kicksArr;
kicksChart.update();

}

setInterval(update,2000);

</script>

</body>
</html>
